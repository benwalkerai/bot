name: Release Assets

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  pull_request:
    branches:
      - "main"

permissions:
  contents: write

jobs:
  build-linux-packages:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install project dependencies
        run: uv sync --extra dev

      - name: Validate tag matches project version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          tag_version="${GITHUB_REF#refs/tags/v}"
          project_version=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )
          if [ "$tag_version" != "$project_version" ]; then
            echo "Tag version ($tag_version) does not match pyproject version ($project_version)."
            exit 1
          fi

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.43.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Linux packages
        run: bash ./build_linux_packages.sh --arch amd64

      - name: Upload Linux package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-assets
          path: |
            dist/linux/*.deb
            dist/linux/*.rpm

  build-windows-packages:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install project dependencies
        run: uv sync --extra dev

      - name: Validate tag matches project version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          $projectVersion = uv run python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          $projectVersion = $projectVersion.Trim()
          if ($tagVersion -ne $projectVersion) {
            Write-Error "Tag version ($tagVersion) does not match pyproject version ($projectVersion)."
            exit 1
          }

      - name: Build Windows executable
        shell: pwsh
        run: ./build_exe.bat

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $output = "inzen_cli_bot_installer_${version}_windows_x64"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" "/DMyOutputBaseFilename=$output" installer.iss

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: |
            dist/inzen_cli_bot.exe
            Output/*.exe

  publish-release-assets:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-linux-packages
      - build-windows-packages
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-release-assets
          path: release-assets/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release-assets
          path: release-assets/windows

      - name: Publish release assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/linux/*.deb
            release-assets/linux/*.rpm
            release-assets/windows/**/inzen_cli_bot_installer_*.exe